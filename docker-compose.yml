version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: team_task_manager
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d team_task_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://root:password@db:5432/team_task_manager?schema=public
      - JWT_SECRET=super_secret_key_for_testing_123
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
